server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # 🚀 Flutter Web Routing Fix (ریفریش کرنے پر 404 ایرر نہیں آئے گا)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 🛡️ Security Headers (ہیکنگ سے بچاؤ کے لیے)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ⚡ Caching for static assets (ایپ کی سپیڈ تیز کرنے کے لیے میڈیا اور سکرپٹس کو کیش کرنا)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|ogg|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 🚨 Error Pages (آپ کی پرانی فائل والا حصہ)
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
